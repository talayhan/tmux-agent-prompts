name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and documentation contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install development tools
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Install shell tools
        run: sudo apt-get update && sudo apt-get install --yes shellcheck shfmt bats
      - name: Format, lint, and documentation checks
        run: make format-check lint test-docs

  unit:
    name: Unit tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: make test-unit
      - name: Upload coverage artifact
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  shell:
    name: Shell orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: sudo apt-get update && sudo apt-get install --yes bats fzf shellcheck shfmt tmux
      - run: make test-shell

  integration:
    name: Headless tmux integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: sudo apt-get update && sudo apt-get install --yes fzf tmux
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: make test-integration

  macos-smoke:
    name: macOS smoke test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: brew install fzf tmux shellcheck shfmt bats-core
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: make test-unit test-shell
