name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    name: Verify and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes bats fzf shellcheck shfmt tmux
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Verify tagged source
        run: make check
      - name: Build source archive and checksums
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git archive --format=tar.gz --prefix="tmux-agent-prompts-${VERSION#v}/" -o "tmux-agent-prompts-${VERSION}.tar.gz" HEAD
          sha256sum "tmux-agent-prompts-${VERSION}.tar.gz" > SHA256SUMS
          sha256sum --check SHA256SUMS
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: gh release create "$VERSION" "tmux-agent-prompts-${VERSION}.tar.gz" SHA256SUMS --generate-notes --verify-tag
